<p-table [value]="receitas" [tableStyle]="{ 'min-width': '50rem' }">
  <ng-template #header>
    <tr>
      <th>Nome</th>
      <th>Categoria</th>
      <th>Tempo de Preparo</th>
      <th>Ações</th>
    </tr>
  </ng-template>

  <ng-template #body let-receita>
    <tr>
      <td><strong>{{ receita.nome }}</strong></td>
      <td>{{ receita.categoria }}</td>
      <td>{{ receita.tempoPreparo }} min</td>
    </tr>
  </ng-template>
</p-table>
